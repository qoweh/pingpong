services:
  pingpong-web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: pingpong-web:local
    container_name: pingpong-web
    ports:
      - "${PINGPONG_WEB_PORT:-8079}:8079"
    environment:
      SERVER_PORT: 8079
      PINGPONG_POLICY_MODEL_PATH: "${PINGPONG_POLICY_MODEL_PATH:-rl/artifacts/pmk_cf_self_rally_v25/pmk_cf_self_rally_v25_model.zip}"
      PINGPONG_POLICY_DETERMINISTIC: "${PINGPONG_POLICY_DETERMINISTIC:-true}"
      PINGPONG_LIVE_SEED: "${PINGPONG_LIVE_SEED:-251}"
    restart: unless-stopped
